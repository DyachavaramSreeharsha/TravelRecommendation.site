<!DOCTYPE html>
<html>

<head>
    <title>Travel Recommendation Website</title>

    <style>

        body{
            margin:0;
            font-family: Arial;
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
            background-size: cover;
            background-position: center;
            color: white;
        }

        nav{
            background-color: rgba(0,0,0,0.7);
            padding: 15px
        }

        nav h2{
            display: inline;
            margin-right: 30px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        input{
            padding: 8px;
            width:220px;
        }

        button{
            padding: 8px 15px;
            cursor:pointer;
        }

        .home-content{
            text-align: center;
            margin-top: 150px;
        }

        .home-content h1{
            font-size: 50px;
        }

        .home-content p{
            font-size: 22px;
        }

        .social-icons {
            position: fixed;
            left: 20px;
            top: 40%;
        }

        .social-icons a{
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }

        #results{
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 20px;
            padding: 30px;
        }

    </style>



</head>
<body>

    <!-- Navigation Bar-->
    <nav>
    
        <!--websitename-->
        <h2>TravelBloom</h2>

        <!--Navigation Links-->
        <a href="travel_recommendation.html">Home</a>

        <a href="about.html">About Us</a>

        <a href="contact.html">Contact us</a>

        <!--search bar-->
        <input type="text" id="searchInput" placeholder="Enter a destination or keyword">

        <!--search button-->
        <button id="searchBtn">Search</button>

        <!--Reset button-->
        <button id="resetBtn">Reset</button>

    </nav>

    <!--Social media icons-->

    <div class="social-icons">

        <a href="#">Facebook</a>
        
        <a href="#">Instagram</a>

        <a href="#">Twitter</a>

    </div>

    <!--Home page content-->

    <div class= "home-content">

        <h1>Explore Dream Destinations</h1>

        <p>
            Discover beautiful temples and places,
            and countries around the world.
        </p>
    </div>

    <!--recommendation reesults-->

    <div id="results"></div>
    
    <script src="travel_recommendation.js"></script>
</body>

</html>
